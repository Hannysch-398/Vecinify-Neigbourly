<section>
  <h1>Mein Profil</h1>

  @if (profile()) {
    <div>
      <p><strong>Name:</strong> {{ profile()?.name ?? '-' }}</p>
      <p><strong>E-Mail:</strong> {{ profile()?.email ?? '-' }}</p>
      <p><strong>Rolle:</strong> {{ profile()?.role ?? '-' }}</p>
      <p><strong>Bewertung:</strong> {{ profile()?.rating ?? '-' }}</p>
    </div>
  } @else {
    <p>Lade Profil...</p>
  }
</section>

<app-account-delete-area></app-account-delete-area>
