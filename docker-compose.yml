services:
  db:
    image: postgres:16
    container_name: neighbourly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: neighbourly
      POSTGRES_USER: neighbourly
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: